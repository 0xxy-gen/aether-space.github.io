<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER | Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,600;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        ::selection { background: #fff; color: #000; } body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .hud-line { height: 1px; background: linear-gradient(90deg, #00E5FF, transparent); width: 100px; margin-bottom: 8px; }

        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.02) 1px, transparent 1px);
            background-size: 80px 80px;
        }
        .content { position: relative; z-index: 10; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up   { animation: fadeUp 0.8s ease forwards; }
        .fade-up-2 { animation: fadeUp 0.8s 0.15s ease forwards; opacity: 0; }
        .fade-up-3 { animation: fadeUp 0.8s 0.3s ease forwards; opacity: 0; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .cursor { display: inline-block; width: 2px; height: 1em; background: #00E5FF; margin-left: 4px; vertical-align: middle; animation: blink 1.1s step-end infinite; }

        /* Contact drawer */
        #contact-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.55); backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.35s ease; }
        #contact-overlay.open { opacity: 1; pointer-events: auto; }
        #contact-drawer { position: fixed; top: 0; right: 0; height: 100%; width: 100%; max-width: 440px; background: #080808; border-left: 1px solid rgba(255,255,255,0.08); z-index: 201; display: flex; flex-direction: column; padding: 48px 40px; overflow-y: auto; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); }
        #contact-drawer.open { transform: translateX(0); }
        .contact-field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
        .contact-field label { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
        .contact-field input, .contact-field textarea { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.12); color: #fff; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 300; padding: 10px 0; outline: none; resize: none; transition: border-color 0.2s; }
        .contact-field input:focus, .contact-field textarea:focus { border-bottom-color: rgba(0,229,255,0.6); }
        .contact-field textarea { min-height: 100px; }
        /* Mobile menu */
        #mobile-menu { position: fixed; inset: 0; z-index: 45; background: #000; display: flex; flex-direction: column; justify-content: center; padding: 0 40px; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        #mobile-menu.open { opacity: 1; pointer-events: auto; }
        #mobile-menu a { display: block; font-family: 'JetBrains Mono', monospace; font-size: 22px; letter-spacing: 0.15em; color: rgba(255,255,255,0.45); text-transform: uppercase; text-decoration: none; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.06); transition: color 0.2s; }
        #mobile-menu a:last-child { border-bottom: none; }
        #mobile-menu a:hover { color: #fff; }
        #mobile-menu button { display: block; }
        #hamburger-btn { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
        @media (max-width: 1023px) { #hamburger-btn { display: flex; } }
        #hamburger-btn span { display: block; width: 20px; height: 1px; background: #fff; transition: transform 0.3s ease, opacity 0.3s ease; }
        #hamburger-btn.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        #hamburger-btn.open span:nth-child(2) { opacity: 0; }
        #hamburger-btn.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <!-- Mobile menu -->
    <div id="mobile-menu">
        <a href="/team/" onclick="closeMobileMenu()">TEAM</a>
        <a href="/careers/" onclick="closeMobileMenu()">CAREERS</a>
        <a href="/partnerships/" onclick="closeMobileMenu()">PARTNERSHIPS</a>
        <a href="/faq/" onclick="closeMobileMenu()">FAQ</a>
        <a href="/blog/" onclick="closeMobileMenu()">BLOG</a>
        <button onclick="closeMobileMenu(); openContact();" class="interactive mono text-[11px] tracking-[0.3em] bg-white text-black px-6 py-3 font-medium mt-8 w-full cursor-pointer">CONTACT US →</button>
    </div>

    <!-- Navigation -->
    <nav class="content fixed top-0 w-full px-8 py-6 flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent" style="z-index:50;">
        <div class="flex items-center gap-16">
            <a href="/"><img src="../images/aether-logo.jpg" alt="AETHER" style="height:28px; filter: invert(1); opacity:0.9;"></a>
            <div class="hidden lg:flex gap-10">
                <a href="/team/" class="mono text-[9px] tracking-[0.3em] text-white/40 hover:text-cyan-400 transition-all">TEAM</a>
                <a href="/careers/" class="mono text-[9px] tracking-[0.3em] text-white/40 hover:text-cyan-400 transition-all">CAREERS</a>
                <a href="/partnerships/" class="mono text-[9px] tracking-[0.3em] text-white/40 hover:text-cyan-400 transition-all">PARTNERSHIPS</a>
                <a href="/faq/" class="mono text-[9px] tracking-[0.3em] text-white/40 hover:text-cyan-400 transition-all">FAQ</a>
                <a href="/blog/" class="mono text-[9px] tracking-[0.3em] text-cyan-400 transition-all">BLOG</a>
            </div>
        </div>
        <div class="flex items-center gap-8">
            <div class="hidden sm:block text-right">
                <p class="mono text-[8px] text-cyan-400 uppercase tracking-widest">System Latency</p>
                <p class="mono text-[10px] text-white/60">0.0024ms</p>
            </div>
            <button onclick="openContact()" class="mono text-[9px] tracking-[0.25em] bg-white text-black px-5 py-2 font-medium hover:bg-white/90 transition-colors cursor-pointer hidden lg:block">CONTACT US</button>
            <button id="hamburger-btn" onclick="toggleMobileMenu()" class="interactive" aria-label="Menu"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div id="contact-overlay" onclick="closeContact()"></div>
    <div id="contact-drawer">
        <div class="flex justify-between items-start mb-12">
            <div>
                <h2 class="text-4xl tracking-tighter leading-[1.05] mb-0">Working on something<br/><span class="font-bold">mission-critical?</span><br/><span class="font-light text-white/60">Get in touch.</span></h2>
            </div>
            <button onclick="closeContact()" class="mono text-[10px] text-white/30 hover:text-white transition-colors cursor-pointer mt-1">✕ CLOSE</button>
        </div>
        <div class="contact-field"><label>Your Name</label><input type="text" name="drawer-name" placeholder="Full name"></div>
        <div class="contact-field"><label>Your Company</label><input type="text" name="drawer-company" placeholder="Your organisation"></div>
        <div class="contact-field"><label>Your Role</label><input type="text" name="drawer-role" placeholder="Your job title"></div>
        <div class="contact-field"><label>Your Email</label><input type="email" name="drawer-email" placeholder="you@example.com"></div>
        <div class="contact-field"><label>Your Message</label><textarea name="drawer-message" placeholder="Tell us what you're working on…"></textarea></div>
        <p id="drawer-status" class="mono text-[9px] mb-3 min-h-[16px]"></p><button onclick="submitContactDrawer()" id="drawer-submit" class="mt-2 w-full bg-white text-black font-semibold py-3 text-sm tracking-wide hover:bg-white/90 transition-colors cursor-pointer">Submit →</button>
    </div>

    <!-- Main -->
    <main class="content min-h-screen flex items-center px-10 lg:px-32 pt-32 pb-24">
        <div class="w-full max-w-2xl">

            <h1 class="text-4xl md:text-5xl lg:text-6xl tracking-tighter mb-6 leading-[1.0] fade-up-2">
                <span class="font-light text-white/60">Transmissions from</span><br/>
                <span class="font-bold">mission control.</span>
            </h1>

            <div class="fade-up-3 flex items-center gap-4 mt-12 mb-10">
                <p class="mono text-[11px] tracking-[0.3em] text-white/25 uppercase">Coming soon</p>
                <span class="cursor"></span>
            </div>

            <div class="fade-up-3">
                <form class="flex gap-0" onsubmit="handleSubscribe(event)">
                    <input id="sub-email" type="email" placeholder="you@example.com" class="bg-transparent border border-white/12 border-r-0 text-white text-sm font-light px-4 py-3 outline-none focus:border-cyan-400/50 transition-colors w-64 placeholder:text-white/20">
                    <button type="submit" class="mono text-[9px] tracking-[0.25em] bg-cyan-400 hover:bg-cyan-300 text-black font-semibold px-6 py-3 transition-colors cursor-pointer whitespace-nowrap">SUBSCRIBE →</button>
                </form>
                <p id="sub-status" class="mono text-[9px] text-cyan-400/70 mt-3 min-h-[16px]"></p>
            </div>
        </div>
    </main>

    <footer class="relative z-10 px-10 lg:px-32 py-5 flex flex-col items-start gap-2 sm:flex-row sm:items-center sm:justify-between ">
        <p class="text-xs text-white/65 font-light sm:flex-1">&copy; 2026 Aether Space, Inc.</p><a href="mailto:contact@aetherspace.tech" class="text-xs text-white/65 font-light hover:text-cyan-400 transition-colors">contact@aetherspace.tech</a><div class="sm:flex-1 sm:flex sm:justify-end"><a href="/privacy/" class="text-xs text-white/65 font-light hover:text-cyan-400 transition-colors">Privacy Policy</a></div>
    </footer>

    <script>
        function openContact() { document.getElementById('contact-overlay').classList.add('open'); document.getElementById('contact-drawer').classList.add('open'); }
        function closeContact() { document.getElementById('contact-overlay').classList.remove('open'); document.getElementById('contact-drawer').classList.remove('open'); }
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.contains('open') ? closeMobileMenu() : openMobileMenu();
        }
        function openMobileMenu() {
            document.getElementById('mobile-menu').classList.add('open');
            document.getElementById('hamburger-btn').classList.add('open');
        }
        function closeMobileMenu() {
            document.getElementById('mobile-menu').classList.remove('open');
            document.getElementById('hamburger-btn').classList.remove('open');
        }
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { closeContact(); closeMobileMenu(); } });

        async function submitContactDrawer() {
            const drawer = document.getElementById('contact-drawer');
            const status = document.getElementById('drawer-status');
            const btn = document.getElementById('drawer-submit');
            const name = drawer.querySelector('[name="drawer-name"]').value.trim();
            const email = drawer.querySelector('[name="drawer-email"]').value.trim();
            const company = drawer.querySelector('[name="drawer-company"]').value.trim();
            const role = drawer.querySelector('[name="drawer-role"]').value.trim();
            const message = drawer.querySelector('[name="drawer-message"]').value.trim();
            if (!name || !email || !message) {
                status.textContent = 'Please fill in your name, email, and message.';
                status.style.color = 'rgba(252,165,165,0.9)'; return;
            }
            btn.disabled = true; btn.textContent = 'Sending...'; status.textContent = '';
            try {
                const res = await fetch('https://aether-contact.gennangqy.workers.dev', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, company, message: (role ? 'Role: ' + role + '\n\n' : '') + message, page: 'contact-drawer-blog', submittedAt: new Date().toISOString() })
                });
                const payload = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(payload.error || 'Please try again.');
                drawer.querySelectorAll('[name^="drawer-"]').forEach(el => el.value = '');
                status.textContent = payload.message || 'Message sent. We will be in touch soon.';
                status.style.color = '#67e8f9';
            } catch (err) {
                status.textContent = err.message || 'Something went wrong. Please try again.';
                status.style.color = 'rgba(252,165,165,0.9)';
            } finally { btn.disabled = false; btn.textContent = 'Submit →'; }
        }

        async function handleSubscribe(e) {
            e.preventDefault();
            const emailEl = document.getElementById('sub-email');
            const status = document.getElementById('sub-status');
            const btn = e.target.querySelector('button[type="submit"]');
            const email = emailEl.value.trim();
            if (!email) return;

            btn.disabled = true;
            btn.textContent = 'SENDING...';
            status.textContent = '';

            try {
                const res = await fetch('https://aether-contact.gennangqy.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: 'Blog Subscriber',
                        email,
                        message: 'Newsletter subscription request.',
                        page: 'blog',
                        submittedAt: new Date().toISOString()
                    })
                });
                await res.json().catch(() => ({}));
                if (!res.ok) throw new Error('Please try again.');
                emailEl.value = '';
                status.textContent = 'You\'re on the list. We\'ll be in touch.';
                status.style.color = '#67e8f9';
            } catch (err) {
                status.textContent = err.message || 'Something went wrong. Please try again.';
                status.style.color = 'rgba(252,165,165,0.9)';
            } finally {
                btn.disabled = false;
                btn.textContent = 'SUBSCRIBE →';
            }
        }
    </script>
</body>
</html>
